name: platza
description: "多肉植物・サボテンをドット絵で育てるお世話管理アプリ"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状態管理
  flutter_riverpod: any
  riverpod_annotation: any

  # ローカルDB
  drift: any
  sqlite3_flutter_libs: any
  path_provider: any
  path: any

  # ルーティング
  go_router: any

  # ドット絵アニメーション
  flame: any

  # SVG表示
  flutter_svg: any

  # 通知
  flutter_local_notifications: any
  timezone: any

  # カメラ・画像選択
  image_picker: any

  # SharedPreferences
  shared_preferences: any

  # HTTP
  http: any

  # ユーティリティ
  uuid: any
  intl: any
  freezed_annotation: any
  json_annotation: any
  collection: any

  # カレンダー
  table_calendar: any

  # Firebase（バックエンド）
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_messaging: any

  # 認証
  sign_in_with_apple: any
  crypto: any

  # 実機 / シミュレータ判定（Emulator 接続切替に使用）
  device_info_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  drift_dev: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  mockito: any
  sqlite3: any
  firebase_auth_mocks: any
  fake_cloud_firestore: any

  # Widgetbook（コンポーネントカタログ）
  widgetbook: any
  widgetbook_annotation: any
  widgetbook_generator: any

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/plants_art/
