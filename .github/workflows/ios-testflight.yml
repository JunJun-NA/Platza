name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'platza/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # device_info_plus 13.x が `@available(iOS 26.1, *)` を含み iOS 26 SDK
      # 必須のため、ランナーのデフォルト Xcode 16.4 では `isiOSAppOnVision`
      # セレクタが解決できずビルドが失敗する。Xcode 26.x を明示する。
      # 参考: https://github.com/fluttercommunity/plus_plugins/issues/3811
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true

      - name: Set up Ruby (with fastlane bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: platza/ios

      - name: flutter pub get
        working-directory: platza
        run: flutter pub get

      - name: Import signing certificate into temporary keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # -t cert を付けると秘密鍵が import されず
          # 次の set-key-partition-list が SecItemCopyMatching で落ちる。
          # -f pkcs12 のみを指定して cert + private key の両方を取り込む。
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build IPA
        working-directory: platza
        run: |
          flutter build ipa --release \
            --flavor=prod \
            -t lib/main_prod.dart \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight via fastlane
        working-directory: platza/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane beta

      - name: Cleanup keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/build_pp.mobileprovision" || true
